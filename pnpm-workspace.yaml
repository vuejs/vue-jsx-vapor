  '@vue-macros/volar': ^3.1.2

  '@vue/shared': 3.6.0-beta.15
  hash-sum: ^2.0.0
  ts-macro: ^0.3.7
  unplugin: ^3.0.0
  unplugin-utils: ^0.3.1
  vite: ^8.0.10
  vitest: ^4.1.5
  vue: 3.6.0-beta.15

allowBuilds:
  esbuild: true
  vue-demi: true
