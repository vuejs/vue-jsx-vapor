name: ecosystem-ci trigger

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/ecosystem-ci run')

    permissions:
      actions: write
      issues: write

    steps:
      - name: Check permission
        uses: actions/github-script@v7
        with:
          script: |
            const user = context.payload.sender.login
            console.log(`Checking permission for: ${user}`)

            let allowed = false
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: user,
              })
              allowed = ['admin', 'write', 'maintain'].includes(data.permission)
            } catch (e) {}

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: allowed ? '+1' : '-1',
            })

            if (!allowed) {
              core.setFailed(`${user} does not have write permission`)
            }

      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            })
            return JSON.stringify({
              num: context.issue.number,
              branchName: pr.head.ref,
              repo: pr.head.repo.full_name,
              commit: pr.head.sha,
            })

      - name: Dispatch ecosystem-ci-from-pr
        uses: actions/github-script@v7
        env:
          COMMENT: ${{ github.event.comment.body }}
        with:
          script: |
            const prData = JSON.parse(${{ steps.pr.outputs.result }})
            // `/ecosystem-ci run` → all；`/ecosystem-ci run vuetify` → single
            const suite = process.env.COMMENT.replace(/^\/ecosystem-ci run/, '').trim()

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ecosystem-ci-from-pr.yml',
              ref: 'main',
              inputs: {
                prNumber:   String(prData.num),
                branchName: prData.branchName,
                repo:       prData.repo,
                commit:     prData.commit,
                suite:      suite || '-',
              },
            })
